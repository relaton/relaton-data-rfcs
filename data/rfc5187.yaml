abstract:
- language: en
  script: Latn
  content: "<p>This document describes the OSPFv3 graceful restart.  The OSPFv3 graceful
    restart is identical to that of OSPFv2 except for the differences described in
    this document.  These differences include the format of the grace Link State Advertisements
    (LSAs) and other considerations. [STANDARDS-TRACK]</p>"
