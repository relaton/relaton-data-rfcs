abstract:
- language: en
  script: Latn
  content: "<p>This document is a survey of the current practices used in today's
    large ISP operational networks to secure layer 2 and layer 3 infrastructure devices.
    \ The information listed here is the result of information gathered from people
    directly responsible for defining and implementing secure infrastructures in Internet
    Service Provider environments.  This memo provides information for the Internet
    community.</p>"
