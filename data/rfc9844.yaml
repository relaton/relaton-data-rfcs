abstract:
- language: en
  script: Latn
  content: "<p>This document describes how the zone identifier of an IPv6 scoped address,
    defined in the IPv6 Scoped Address Architecture specification (RFC 4007), should
    be entered into a user interface.  This document obsoletes RFC 6874 and updates
    RFCs 4007, 7622, and 8089.</p>"
