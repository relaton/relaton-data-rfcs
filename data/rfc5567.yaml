abstract:
- language: en
  script: Latn
  content: "<p>This document describes an architectural framework for Media Server
    control.  The primary focus will be to define logical entities that exist within
    the context of Media Server control, and define the appropriate naming conventions
    and interactions between them.  This memo provides information for the Internet
    community.</p>"
