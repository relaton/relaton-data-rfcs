abstract:
- language: en
  script: Latn
  content: "<p>Cisco's Service-Level Assurance Protocol (Cisco's SLA Protocol) is
    a Performance Measurement protocol that has been widely deployed.  The protocol
    is used to measure service-level parameters such as network latency, delay variation,
    and packet/frame loss.  This document describes the Cisco SLA Protocol Measurement-Type
    UDP-Measurement, to enable vendor interoperability.  This document is not an Internet
    Standards Track specification; it is published for informational purposes.</p>"
