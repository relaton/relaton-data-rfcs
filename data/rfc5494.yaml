abstract:
- language: en
  script: Latn
  content: "<p>This document specifies the IANA guidelines for allocating new values
    in the Address Resolution Protocol (ARP).  This document also reserves some numbers
    for experimentation purposes.  The changes also affect other protocols that employ
    values from the ARP name spaces. [STANDARDS-TRACK]</p>"
