abstract:
- language: en
  script: Latn
  content: "<p>This bibliography offers a short list of recent information resources
    that will help the network novice become familiar with the Internet, including
    its associated networks, resources, protocols, and history.  This memo provides
    information for the Internet community.  It does not specify an Internet standard.</p>"
