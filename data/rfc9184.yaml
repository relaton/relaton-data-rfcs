- language: en
  script: Latn
  content: <p>This document updates several BGP Extended Community registries in order
    to replace the "Experimental Use" registration procedure in some entries, since
    their use is clearly not experimental and is thus misleading.</p><p>This document
    updates RFCs 7153 and 8955.</p>
