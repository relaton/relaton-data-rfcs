abstract:
- language: en
  script: Latn
  content: "<p>This memo documents the currently assigned values from several series
    of numbers used in network protocol implementations.  This edition of Assigned
    Numbers updates and obsoletes RFC-943.  This memo is an official status report
    on the numbers used in protocols in the ARPA-Internet community.  See RFC-990
