abstract:
- language: en
  script: Latn
  content: "<p>The fragmentation and reassembly algorithm specified in the base IPv6
    specification allows fragments to overlap.  This document demonstrates the security
    issues associated with allowing overlapping fragments and updates the IPv6 specification
    to explicitly forbid overlapping fragments. [STANDARDS-TRACK]</p>"
