abstract:
- language: en
  script: Latn
  content: "<p>This memo is the complete technical specification to store in the Internet
    Domain Name System (DNS) the mapping information (MCGAM) needed by MIXER conformant
    e-mail gateways and other tools to map RFC822 domain names into X.400 O/R names
    and vice versa. [STANDARDS-TRACK]</p>"
