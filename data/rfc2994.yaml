abstract:
- language: en
  script: Latn
  content: "<p>This document describes a secret-key cryptosystem MISTY1, which is
    block cipher with a 128-bit key, a 64-bit block and a variable number of rounds.
    \ It documents the algorithm description including key scheduling part and data
    randomizing part.  This memo provides information for the Internet community.</p>"
