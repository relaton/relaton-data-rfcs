abstract:
- language: en
  script: Latn
  content: "<p>This memo presents a security labeling framework for the Internet.
    \ The framework is intended to help protocol designers determine what, if any,
    security labeling should be supported by their protocols.  This memo provides
    information for the Internet community.  It does not specify an Internet standard.</p>"
