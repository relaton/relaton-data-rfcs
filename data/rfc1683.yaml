abstract:
- language: en
  script: Latn
  content: "<p>In this document, we identify several features that affect a protocol's
    ability to operate in a multiprotocol environment and propose the incorporation
    of these features into IPng.  This memo provides information for the Internet
    community.  This memo does not specify an Internet standard of any kind.</p>"
