abstract:
- language: en
  script: Latn
  content: "<p>The Routing Protocol for Low-Power and Lossy Networks (RPL) includes
    routing information in data-plane datagrams to quickly identify inconsistencies
    in the routing topology.  This document describes the RPL Option for use among
    RPL routers to include such routing information. [STANDARDS-TRACK]</p>"
