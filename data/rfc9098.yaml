- language: en
  script: Latn
  content: "<p>This document summarizes the operational implications of IPv6 extension
    headers specified in the IPv6 protocol specification (RFC 8200) and attempts to
    analyze reasons why packets with IPv6 extension headers are often dropped in the
    public Internet.</p>"
