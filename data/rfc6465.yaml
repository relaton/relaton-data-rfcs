abstract:
- language: en
  script: Latn
  content: "<p>This document describes a mechanism for RTP-level mixers in audio conferences
    to deliver information about the audio level of individual participants.  Such
    audio level indicators are transported in the same RTP packets as the audio data
    they pertain to. [STANDARDS-TRACK]</p>"
