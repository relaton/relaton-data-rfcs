abstract:
- language: en
  script: Latn
  content: "<p>This document sets guidelines for human rights considerations for developers
    working on network protocols and architectures, similar to the work done on the
    guidelines for privacy considerations (RFC 6973). This is an updated version of
    the guidelines for human rights considerations in RFC 8280.</p><p>This document
    is a product of the Human Right Protocol Considerations (HRPC) Research Group
    in the IRTF.</p>"
