abstract:
- language: en
  script: Latn
  content: <p>Deployments of Zstandard, or "zstd", can use different window sizes
    to limit memory usage during compression and decompression.  Some browsers and
    user agents limit window sizes to mitigate memory usage concerns, thereby causing
    interoperability issues.  This document updates the window size limit in RFC 8878
    from a recommendation to a requirement in HTTP contexts.</p>
