abstract:
- language: en
  script: Latn
  content: "<p>This document describes a language for specifying rulesets, i.e.  configuration
    files which may be loaded into a traffic flow meter so as to specify which traffic
    flows are measured by the meter, and the information it will store for each flow.
    \ This memo provides information for the Internet community.</p>"
