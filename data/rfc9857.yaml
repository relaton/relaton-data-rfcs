abstract:
- language: en
  script: Latn
  content: "<p>This document describes a mechanism used to collect Segment Routing
    (SR) Policy information that is locally available in a node and advertise it into
    BGP - Link State (BGP-LS) updates.  Such information can be used by external components
    for path computation, reoptimization, service placement, network visualization,
    etc.</p>"
