abstract:
- language: en
  script: Latn
  content: <p>This document describes the MD2 message-digest algorithm.  The algorithm
    takes as input a message of arbitrary length and produces as output a 128-bit
    "fingerprint" or "message digest" of the input.  This memo provides information
    for the Internet community.  It does not specify an Internet standard.</p>
