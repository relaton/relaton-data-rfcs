abstract:
- language: en
  script: Latn
  content: "<p>This document defines the architecture of Netnews systems and specifies
    the correct manipulation and interpretation of Netnews articles by software that
    originates, distributes, stores, and displays them.  It also specifies the requirements
    that must be met by any protocol used to transport and serve Netnews articles.
    [STANDARDS-TRACK]</p>"
