abstract:
- language: en
  script: Latn
  content: "<p>The goal of this document is to unite regionally operated X.400 services
    on the various continents into one GO-MHS Community (as seen from an end-user's
    point of view).  This memo provides information for the Internet community.  This
    memo does not specify an Internet standard of any kind.</p>"
