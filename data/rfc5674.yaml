abstract:
- language: en
  script: Latn
  content: "<p>This document describes how to send alarm information in syslog.  It
    includes the mapping of ITU perceived severities onto syslog message fields.  It
    also includes a number of alarm-specific SD-PARAM definitions from X.733 and the
    IETF Alarm MIB. [STANDARDS-TRACK]</p>"
