abstract:
- language: en
  script: Latn
  content: "<p>This memo defines the IP Flow Information eXport (IPFIX) architecture
    for the selective monitoring of IP Flows, and for the export of measured IP Flow
    information from an IPFIX Device to a Collector.  This memo provides information
    for the Internet community.</p>"
