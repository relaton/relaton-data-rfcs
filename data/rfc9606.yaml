abstract:
- language: en
  script: Latn
  content: "<p>This document specifies a method for DNS resolvers to publish information
    about themselves.  DNS clients can use the resolver information to identify the
    capabilities of DNS resolvers.  How DNS clients use such information is beyond
    the scope of this document.</p>"
