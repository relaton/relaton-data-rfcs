abstract:
- language: en
  script: Latn
  content: "<p>This memo defines a portion of the Management Information Base (MIB)
    for use with network management protocols in the Internet community.  In particular,
    it describes objects used for managing DS1, E1, DS2 and E2 interfaces.  This document
    is a companion document with Definitions of Managed Objects for the DS0 (RFC 2494),
    DS3/E3 (RFC 2496), and the work in progress, SONET/SDH Interface Types. [STANDARDS-TRACK]</p>"
