abstract:
- language: en
  script: Latn
  content: "<p>This memo describes the state of standardization of protocols used
    in the Internet as determined by the Internet Activities Board (IAB).  An overview
    of the standards procedures is presented first, followed by discussions of the
    standardization process and the RFC document series, then the explanation of the
    terms is presented, the lists of protocols in each stage of standardization follows,
    and finally pointers to references and contacts for further information.  This
    memo is issued quarterly, please be sure the copy you are reading is dated within
    the last three months.  Current copies may be obtained from the Network Information
    Center or from the Internet Assigned Numbers Authority (see the contact information
    at the end of this memo).  Do not use this memo after 31-July-89.</p>"
