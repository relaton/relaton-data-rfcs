abstract:
- language: en
  script: Latn
  content: "<p>This document proposes a revised model of Domain Name System Security
    (DNSSEC) Signing Authority.  The revised model is designed to clarify earlier
    documents and add additional restrictions to simplify the secure resolution process.
    \ Specifically, this affects the authorization of keys to sign sets of records.
    [STANDARDS-TRACK]</p>"
