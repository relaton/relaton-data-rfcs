abstract:
- language: en
  script: Latn
  content: "<p>This document describes the guidelines and procedures for formation
    and operation of IETF working groups.  It describes the formal relationship between
    IETF participants WG and the Internet Engineering Steering Group (IESG).  This
    memo provides information for the Internet community.  This memo does not specify
    an Internet standard of any kind.</p>"
