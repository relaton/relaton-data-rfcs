abstract:
- language: en
  script: Latn
  content: "<p>This document clarifies and updates several requirements of RFCs 4787,
    5382, and 5508 based on operational and development experience. The focus of this
    document is Network Address Translation from IPv4 to IPv4 (NAT44).</p><p>This
    document updates RFCs 4787, 5382, and 5508.</p>"
