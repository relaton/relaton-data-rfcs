abstract:
- language: en
  script: Latn
  content: "<p>Working Party 1/2, of the International Telecommunication Union Telecommunication
    Standardization Sector (ITU-T) held a meeting of its collaborators in Berlin Germany
    19-26 October 2000.  This liaison from WP1/2 to the IETF/ISOC conveys the understandings
    of the WP1/2 collaborators resulting from the discussions.  This memo provides
    information for the Internet community.</p>"
