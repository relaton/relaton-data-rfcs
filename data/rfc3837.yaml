abstract:
- language: en
  script: Latn
  content: "<p>The document investigates the security threats associated with the
    Open Pluggable Edge Services (OPES) and discusses the effects of security threats
    on the underlying architecture.  The main goal of this document is threat discovery
    and analysis.  The document does not specify or recommend any solutions.  This
    memo provides information for the Internet community.</p>"
