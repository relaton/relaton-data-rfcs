- language: en
  script: Latn
  content: "<p>This RFC proposes an elective experimental Encoding header field to
    permit the mailing of multi-part, multi-structured messages.  The use of Encoding
    updates RFC 1049 (Content-Type), and is a suggested update to RFCs 1113, 1114,
    and 1115 (Privacy Enhancement).</p>"
