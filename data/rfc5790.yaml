abstract:
- language: en
  script: Latn
  content: "<p>This document describes lightweight IGMPv3 and MLDv2 protocols (LW-
    IGMPv3 and LW-MLDv2), which simplify the standard (full) versions of IGMPv3 and
    MLDv2.  The interoperability with the full versions and the previous versions
