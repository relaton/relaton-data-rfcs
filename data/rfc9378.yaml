abstract:
- language: en
  script: Latn
  content: "<p>In situ Operations, Administration, and Maintenance (IOAM) collects
    operational and telemetry information in the packet while the packet traverses
    a path between two points in the network.  This document provides a framework
    for IOAM deployment and provides IOAM deployment considerations and guidance.</p>"
