abstract:
- language: en
  script: Latn
  content: "<p>This document discourages the practice of introducing software defects
    in general and in network protocol implementations specifically.  Software defects
    are one of the largest cost drivers for the networking industry.  This document
    is intended to clarify the best current practice in this regard.</p>"
