abstract:
- language: en
  script: Latn
  content: "<p>This document specifies how an Automated Certificate Management Environment
    (ACME) server may provide suggestions to ACME clients as to when they should attempt
    to renew their certificates.  This allows servers to mitigate load spikes and
    ensures that clients do not make false assumptions about appropriate certificate
    renewal periods.</p>"
