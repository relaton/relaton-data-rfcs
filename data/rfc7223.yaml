abstract:
- language: en
  script: Latn
  content: "<p>This document defines a YANG data model for the management of network
    interfaces.  It is expected that interface-type-specific data models augment the
    generic interfaces data model defined in this document.  The data model includes
    configuration data and state data (status information and counters for the collection
    of statistics).</p>"
