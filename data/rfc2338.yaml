abstract:
- language: en
  script: Latn
  content: "<p>This memo defines the Virtual Router Redundancy Protocol (VRRP).  VRRP
    specifies an election protocol that dynamically assigns responsibility for a virtual
    router to one of the VRRP routers on a LAN. [STANDARDS-TRACK]</p>"
