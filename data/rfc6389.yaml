abstract:
- language: en
  script: Latn
  content: "<p>This document describes procedures for distributing upstream-assigned
    labels for the Label Distribution Protocol (LDP).  It also describes how these
    procedures can be used for avoiding branch Label Switching Router (LSR) traffic
    replication on a LAN for LDP point-to-multipoint (P2MP) Label Switched Paths (LSPs).
    [STANDARDS-TRACK]</p>"
