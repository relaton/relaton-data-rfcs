abstract:
- language: en
  script: Latn
  content: "<p>This memo defines a portion of the Management Information Base (MIB)
    for use with network management protocols in TCP/IP based internets.  In particular,
    it defines objects for managing networks using Synchronous Optical Network (SONET)
    linear Automatic Protection Switching (APS) architectures. [STANDARDS-TRACK]</p>"
