abstract:
- language: en
  script: Latn
  content: "<p>This memo defines a portion of the Management Information Base (MIB)
    for use with network management protocols in the Internet community.  In particular,
    it describes managed objects used for managing IP Multicast Routing for IPv4,
    independent of the specific multicast routing protocol in use. [STANDARDS-TRACK]</p>"
