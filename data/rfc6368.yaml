abstract:
- language: en
  script: Latn
  content: "<p>This document defines protocol extensions and procedures for BGP Provider/Customer
    Edge router iteration in BGP/MPLS IP VPNs.  These extensions and procedures have
    the objective of making the usage of the BGP/MPLS IP VPN transparent to the customer
    network, as far as routing information is concerned. [STANDARDS-TRACK]</p>"
