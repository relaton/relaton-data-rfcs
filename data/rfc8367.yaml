abstract:
- language: en
  script: Latn
  content: "<p>Routers and middleboxes terminate packets for various reasons.  In
    some cases, these packets are wrongfully terminated.  This memo describes some
    of the most common scenarios of wrongful termination of Internet Protocol (IP)
    packets and presents recommendations for mitigating them.</p>"
