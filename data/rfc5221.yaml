abstract:
- language: en
  script: Latn
  content: "<p>There are some problematic cases when using the default address selection
    mechanism that RFC 3484 defines.  This document describes additional requirements
    that operate with RFC 3484 to solve the problems.  This memo provides information
    for the Internet community.</p>"
