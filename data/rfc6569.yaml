abstract:
- language: en
  script: Latn
  content: "<p>This document provides general guidelines for work on developing and
    specifying an interactive audio codec within the IETF.  These guidelines cover
    the development process, evaluation, requirements conformance, and intellectual
    property issues.  This document is not an Internet Standards Track specification;
    it is published for informational purposes.</p>"
