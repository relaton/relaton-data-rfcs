abstract:
- language: en
  script: Latn
  content: "<p>This document proposes a method to manage the dynamic bandwidth allocation
    of implementations supporting the PPP multilink protocol.  This is done by defining
    the Bandwidth Allocation Protocol (BAP), as well as its associated control protocol,
    the Bandwidth Allocation Control Protocol (BACP). [STANDARDS-TRACK]</p>"
