abstract:
- language: en
  script: Latn
  content: "<p>This document provides guidelines for developers of the Next Hop Resolution
    Protocol Clients (NHC).  The intent is to define the interaction between the NHC
    code and the TCP/IP protocol stack of the local host operating system.  This memo
    provides information for the Internet community.</p>"
