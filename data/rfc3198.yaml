abstract:
- language: en
  script: Latn
  content: "<p>This document is a glossary of policy-related terms.  It provides abbreviations,
    explanations, and recommendations for use of these terms.  The intent is to improve
    the comprehensibility and consistency of writing that deals with network policy,
    particularly Internet Standards documents (ISDs).  This memo provides information
    for the Internet community.</p>"
