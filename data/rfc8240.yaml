abstract:
- language: en
  script: Latn
  content: "<p>This document provides a summary of the Internet of Things Software
    Update (IoTSU) Workshop that took place at Trinity College Dublin, Ireland on
    the 13th and 14th of June, 2016. The main goal of the workshop was to foster a
    discussion on requirements, challenges, and solutions for bringing software and
    firmware updates to IoT devices. This report summarizes the discussions and lists
    recommendations to the standards community.</p><p>Note that this document is a
    report on the proceedings of the workshop. The views and positions documented
    in this report are those of the workshop participants and do not necessarily reflect
    IAB views and positions.</p>"
