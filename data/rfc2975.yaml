abstract:
- language: en
  script: Latn
  content: "<p>This document describes and discusses the issues involved in the design
    of the modern accounting systems.  The field of Accounting Management is concerned
    with the collection the collection of resource consumption data for the purposes
    of capacity and trend analysis, cost allocation, auditing, and billing.  This
    memo provides information for the Internet community.</p>"
