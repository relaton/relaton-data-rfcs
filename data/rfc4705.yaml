abstract:
- language: en
  script: Latn
  content: "<p>This document describes the encryption and key management used by GigaBeam
    as part of the WiFiber(tm) family of radio link products.  The security solution
    is documented in the hope that other wireless product development efforts will
    include comparable capabilities.  This memo provides information for the Internet
    community.</p>"
