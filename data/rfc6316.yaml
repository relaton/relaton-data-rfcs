abstract:
- language: en
  script: Latn
  content: <p>This document specifies sockets API extensions for the multihoming shim
    layer. The API aims to enable interactions between applications and the multihoming
    shim layer for advanced locator management, and access to information about failure
    detection and path exploration.</p><p>This document is based on an assumption
    that a multihomed host is equipped with a conceptual sub-layer (hereafter called
    "shim sub- layer") inside the IP layer that maintains mappings between identifiers
    and locators. Examples of the shim are Shim6 and the Host Identity Protocol (HIP).
    This document is not an Internet Standards Track specification; it is published
    for informational purposes.</p>
