abstract:
- language: en
  script: Latn
  content: "<p>This document defines an Optional Parameter, called Capabilities, that
    is expected to facilitate the introduction of new capabilities in the Border Gateway
    Protocol (BGP) by providing graceful capability advertisement without requiring
    that BGP peering be terminated.</p><p>This document obsoletes RFC 3392. [STANDARDS-TRACK]</p>"
