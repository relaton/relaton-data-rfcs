abstract:
- language: en
  script: Latn
  content: "<p>This memo is intended to make more people aware of the present developments
    in the Computer Conferencing field as well as put forward ideas on what should
    be done to formalize this work so that there is a common standard for programmers
    and others who are involved in this field to work with.  This memo provides information
    for the Internet community.  It does not specify an Internet standard.</p>"
