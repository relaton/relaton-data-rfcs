abstract:
- language: en
  script: Latn
  content: <p>RFC 5785 defines a path prefix, "/.well-known/", that can be used by
    well-known URIs.  It was specifically defined for the "http" and "https" URI schemes.  The
    present memo formally updates RFC 6455, which defines the URI schemes defined
    for the WebSocket Protocol, to extend the use of these well-known URIs to those
    URI schemes.</p>
