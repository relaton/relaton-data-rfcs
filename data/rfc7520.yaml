abstract:
- language: en
  script: Latn
  content: "<p>This document contains a set of examples using JSON Object Signing
    and Encryption (JOSE) technology to protect data.  These examples present a representative
    sampling of JSON Web Key (JWK) objects as well as various JSON Web Signature (JWS)
    and JSON Web Encryption (JWE) results given similar inputs.</p>"
