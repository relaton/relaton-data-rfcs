  content: "<p>This RFC reports an official Internet Activities Board (IAB) policy
    position on the treatment of Network Management in the Internet.  This RFC presents
    the results and recommendations of the second Ad Hoc Network Management Review
    on June 12, 1989.  The results of the first such meeting were reported in RFC
    1052.</p>"
