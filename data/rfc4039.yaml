abstract:
- language: en
  script: Latn
  content: "<p>This document defines a new Dynamic Host Configuration Protocol version
    4 (DHCPv4) option, modeled on the DHCPv6 Rapid Commit option, for obtaining IP
    address and configuration information using a 2-message exchange rather than the
    usual 4-message exchange, expediting client configuration. [STANDARDS-TRACK]</p>"
