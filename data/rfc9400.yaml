- language: en
  script: Latn
  content: "<p>This document provides guidelines for the planning and organization
    of fully online meetings, regarding the number, length, and composition of sessions
    on the meeting agenda.  These guidelines are based on the experience gained by
    holding online meetings during the COVID-19 pandemic in 2020 and 2021.</p>"
