abstract:
- language: en
  script: Latn
  content: "<p>This document catalogues some of the experiences gained in developing
    the necessary infrastructure for a national (i.e., multi-organizational) directory
    service and pilot deployment of the service in an environment with off-the-shelf
    directory service products.  This memo provides information for the Internet community.</p>"
