abstract:
- language: en
  script: Latn
  content: "<p>This memo outlines the guidelines for selection of members of the IETF
    Administrative Oversight Committee, and describes the selection process used by
    the IAB and the IESG.  This document specifies an Internet Best Current Practices
    for the Internet Community, and requests discussion and suggestions for improvements.</p>"
