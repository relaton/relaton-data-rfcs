  content: "<p>This FYI RFC contains biographical information about members of the
    Internet Activities Board (IAB), the Internet Engineering Steering Group (IESG)
    of the Internet Engineering Task Force (IETF), and the the Internet Research Steering
    Group (IRSG) of the Internet Research Task Force (IRTF).  This memo provides information
