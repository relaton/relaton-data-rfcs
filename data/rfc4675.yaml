abstract:
- language: en
  script: Latn
  content: "<p>This document proposes additional Remote Authentication Dial-In User
    Service (RADIUS) attributes for dynamic Virtual LAN assignment and prioritization,
    for use in provisioning of access to IEEE 802 local area networks.  These attributes
    are usable within either RADIUS or Diameter. [STANDARDS-TRACK]</p>"
