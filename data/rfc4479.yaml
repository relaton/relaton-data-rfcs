abstract:
- language: en
  script: Latn
  content: "<p>This document defines the underlying presence data model used by Session
    Initiation Protocol (SIP) for Instant Messaging and Presence Leveraging Extensions
    (SIMPLE) presence agents.  The data model provides guidance on how to map various
    communications systems into presence documents in a consistent fashion. [STANDARDS-TRACK]</p>"
