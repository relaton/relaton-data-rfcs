- language: en
  script: Latn
  content: "<p>This memo defines objects used for managing ATM-based interfaces, devices,
    and services, in addition to those defined in RFC 2515, the ATM-MIB, to provide
    additional support for the management of ATM Switched Virtual Connections (SVCs)
