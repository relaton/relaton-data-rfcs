abstract:
- language: en
  script: Latn
  content: <p>This memo defines a portion of the Management Information Base (MIB)
    for use with network management protocols in the Internet community In particular,
    it describes managed objects used for managing the Border Gateway Protocol Version
    4 or lower.</p><p>The origin of this memo is from RFC 1269 "Definitions of Managed
    Objects for the Border Gateway Protocol (Version 3)", which was updated to support
    BGP-4 in RFC 1657. This memo fixes errors introduced when the MIB module was converted
    to use the SMIv2 language. This memo also updates references to the current SNMP
    framework documents.</p><p>This memo is intended to document deployed implementations
    of this MIB module in a historical context, to provide clarifications of some
    items, and to note errors where the MIB module fails to fully represent the BGP
    protocol. Work is currently in progress to replace this MIB module with a new
    one representing the current state of the BGP protocol and its extensions.</p><p>This
    document obsoletes RFC 1269 and RFC 1657. [STANDARDS-TRACK]</p>
