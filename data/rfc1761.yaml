abstract:
- language: en
  script: Latn
  content: <p>This paper describes the file format used by "snoop", a packet monitoring
    and capture program developed by Sun.  This paper is provided so that people can
    write compatible programs to generate and interpret snoop packet capture files.  This
    memo provides information for the Internet community.  This memo does not specify
    an Internet standard of any kind.</p>
