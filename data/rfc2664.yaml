abstract:
- language: en
  script: Latn
  content: "<p>This memo provides an overview to the new Internet User.  The intended
    audience is the common Internet user of today, thus it attempts to provide a more
    consumer oriented approach to the Internet rather than going into any depth about
    a topic.  This memo provides information for the Internet community.</p>"
