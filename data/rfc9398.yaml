abstract:
- language: en
  script: Latn
  content: "<p>This document defines a YANG data model that can be used to configure
    and manage Internet Group Management Protocol (IGMP) or Multicast Listener Discovery
    (MLD) Proxy devices.  The YANG module in this document conforms to the Network
    Management Datastore Architecture (NMDA).</p>"
