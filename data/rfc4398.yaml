abstract:
- language: en
  script: Latn
  content: "<p>Cryptographic public keys are frequently published, and their authenticity
    is demonstrated by certificates.  A CERT resource record (RR) is defined so that
    such certificates and related certificate revocation lists can be stored in the
    Domain Name System (DNS). [STANDARDS-TRACK]</p>"
