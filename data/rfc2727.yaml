abstract:
- language: en
  script: Latn
  content: "<p>The process by which the members of the IAB and IESG are selected,
    confirmed, and recalled is specified.  This document is a self- consistent, organized
    compilation of the process as it was known at the time of publication.  This document
    specifies an Internet Best Current Practices for the Internet Community, and requests
    discussion and suggestions for improvements.</p>"
