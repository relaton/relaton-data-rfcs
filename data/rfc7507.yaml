abstract:
- language: en
  script: Latn
  content: "<p>This document defines a Signaling Cipher Suite Value (SCSV) that prevents
    protocol downgrade attacks on the Transport Layer Security (TLS) and Datagram
    Transport Layer Security (DTLS) protocols.  It updates RFCs 2246, 4346, 4347,
    5246, and 6347.  Server update considerations are included.</p>"
