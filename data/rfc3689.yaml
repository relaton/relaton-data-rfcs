- language: en
  script: Latn
  content: "<p>This document presents a list of general requirements in support of
    Emergency Telecommunications Service (ETS).  Solutions to these requirements are
    not presented in this document.  Additional requirements pertaining to specific
    applications, or types of applications, are to be specified in separate document(s).
