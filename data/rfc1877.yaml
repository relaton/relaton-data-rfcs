abstract:
- language: en
  script: Latn
  content: "<p>This document extends the NCP for establishing and configuring the
    Internet Protocol over PPP [2], defining the negotiation of primary and secondary
    Domain Name System (DNS) [3] and NetBIOS Name Server (NBNS) [4] addresses.  This
    memo provides information for the Internet community.  This memo does not specify
    an Internet standard of any kind.</p>"
