abstract:
- language: en
  script: Latn
  content: "<p>This document provides a method of encrypting data using user-supplied
    passwords and, by extension, any form of variable-length keying material which
    is not necessarily an algorithm-specific fixed-format key.  The Cryptographic
    Message Syntax data format does not currently contain any provisions for password-based
