abstract:
- language: en
  script: Latn
  content: "<p>This memo defines a portion of the Management Information Base (MIB)
    for use with network management protocols in TCP/IP-based internets.  In particular,
    it defines objects for managing a client using the Internet Small Computer System
    Interface (iSCSI) protocol (SCSI over TCP). [STANDARDS-TRACK]</p>"
