abstract:
- language: en
  script: Latn
  content: <p>The protocol specification for SOCKS Version 5 specifies a generalized
    framework for the use of arbitrary authentication protocols in the initial socks
    connection setup.  This document describes one of those protocols, as it fits
    into the SOCKS Version 5 authentication "subnegotiation". [STANDARDS-TRACK]</p>
