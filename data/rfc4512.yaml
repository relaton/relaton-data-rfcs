abstract:
- language: en
  script: Latn
  content: "<p>The Lightweight Directory Access Protocol (LDAP) is an Internet protocol
    for accessing distributed directory services that act in accordance with X.500
    data and service models.  This document describes the X.500 Directory Information
    Models, as used in LDAP. [STANDARDS-TRACK]</p>"
