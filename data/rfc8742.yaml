abstract:
- language: en
  script: Latn
  content: <p>This document describes the Concise Binary Object Representation (CBOR)
    Sequence format and associated media type "application/cbor-seq". A CBOR Sequence
    consists of any number of encoded CBOR data items, simply concatenated in sequence.</p><p>Structured
    syntax suffixes for media types allow other media types to build on them and make
    it explicit that they are built on an existing media type as their foundation.
    This specification defines and registers "+cbor-seq" as a structured syntax suffix
    for CBOR Sequences.</p>
