abstract:
- language: en
  script: Latn
  content: "<p>This document describes a language tag for use in cases where it is
    desired to indicate the language used in an information object, how to register
    values for use in this language tag, and a construct for matching such language
    tags.  This document specifies an Internet Best Current Practices for the Internet
    Community, and requests discussion and suggestions for improvements.</p>"
