abstract:
- language: en
  script: Latn
  content: "<p>This document proposes an extension to the Session Initiation Protocol
    (SIP).  This extension adds the INFO method to the SIP protocol.  The intent of
    the INFO method is to allow for the carrying of session related control information
    that is generated during a session. [STANDARDS-TRACK]</p>"
