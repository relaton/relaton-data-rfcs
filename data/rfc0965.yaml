abstract:
- language: en
  script: Latn
  content: "<p>This RFC describes the requirements for a graphical format on which
    to base a graphical on-line communication protocol, and proposes an Interactive
    Graphical Communication Format using the GKSM session metafile.  We hope this
    contribution will encourage the discussion of multimedia data exchange and the
    proposal of solutions.</p>"
