abstract:
- language: en
  script: Latn
  content: "<p>This document describes a Datagram Transport Layer Security (DTLS)
    extension to establish keys for Secure RTP (SRTP) and Secure RTP Control Protocol
    (SRTCP) flows.  DTLS keying happens on the media path, independent of any out-of-band
    signalling channel present. [STANDARDS-TRACK]</p>"
