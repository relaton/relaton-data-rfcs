abstract:
- language: en
  script: Latn
  content: "<p>TCP/IPX allows TCP/IP applications to run over IPX networks by letting
    TCP and UDP run over IPX.  And this memo specifies the packet format and operational
    procedures for running TCP and UDP over IPX.  This document defines an Experimental
    Protocol for the Internet community.  This does not specify an Internet standard
    of any kind.</p>"
