abstract:
- language: en
  script: Latn
  content: "<p>This document is designed to assist vendors and other participants
    in trade shows, such as Networld+Interop, in designing effective protection against
    network and system attacks by unauthorized individuals.  This memo provides information
    for the Internet community.  This memo does not specify an Internet standard of
    any kind.</p>"
