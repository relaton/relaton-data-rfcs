abstract:
- language: en
  script: Latn
  content: "<p>This document specifies how to use IEEE Std 1394-1995, Standard for
    a High Performance Serial Bus (and its supplements), for the transport of Internet
    Protocol Version 4 (IPv4) datagrams; it defines the necessary methods, data structures
