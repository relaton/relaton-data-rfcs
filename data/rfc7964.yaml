abstract:
- language: en
  script: Latn
  content: "<p>Routing information reduction by BGP Route Reflection or Confederation
    can result in persistent internal BGP route oscillations with certain routing
    setups and network topologies.  This document specifies two sets of additional
    paths that can be used to eliminate these route oscillations in a network.</p>"
