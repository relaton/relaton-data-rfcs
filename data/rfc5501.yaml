abstract:
- language: en
  script: Latn
  content: "<p>This document provides functional requirements for network solutions
    that support multicast over Virtual Private LAN Service (VPLS).  It specifies
    requirements both from the end user and service provider standpoints.  It is intended
    that potential solutions will use these requirements as guidelines.  This memo
    provides information for the Internet community.</p>"
