abstract:
- language: en
  script: Latn
  content: "<p>This document describes a framework for IP Flow Information Export
    (IPFIX) Mediation.  This framework extends the IPFIX reference model specified
    in RFC 5470 by defining the IPFIX Mediator components.  This document is not an
    Internet Standards Track specification; it is published for informational purposes.</p>"
