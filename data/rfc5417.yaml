abstract:
- language: en
  script: Latn
  content: "<p>The Control And Provisioning of Wireless Access Points Protocol allows
    a Wireless Termination Point to use DHCP to discover the Access Controllers to
    which it is to connect.  This document describes the DHCP options to be used by
    the CAPWAP Protocol. [STANDARDS-TRACK]</p>"
