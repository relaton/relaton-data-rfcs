abstract:
- language: en
  script: Latn
  content: "<p>This document defines terminology and enumerates requirements for the
    context resolution of emergency calls placed by the public using voice-over-IP
    (VoIP) and general Internet multimedia systems, where Internet protocols are used
    end to end.  This memo provides information for the Internet community.</p>"
