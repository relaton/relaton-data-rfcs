abstract:
- language: en
  script: Latn
  content: "<p>The Concise Binary Object Representation (CBOR, RFC 8949) is a data
    format whose design goals include the possibility of extremely small code size,
    fairly small message size, and extensibility without the need for version negotiation.</p><p>In
    CBOR, one point of extensibility is the definition of CBOR tags. RFC 8949 defines
    two tags for time: CBOR tag 0 (RFC 3339 time as a string) and tag 1 (POSIX time
    as int or float). Since then, additional requirements have become known. The present
    document defines a CBOR tag for time that allows a more elaborate representation
    of time, as well as related CBOR tags for duration and time period. This document
    is intended as the reference document for the IANA registration of the CBOR tags
    defined.</p>"
