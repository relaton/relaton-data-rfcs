- language: en
  script: Latn
  content: "<p>As required by the Routing Protocol Criteria [RFC 1264], this memo
    discusses the applicability of the Next Hop Resolution Protocol (NHRP) in routing
    of IP datagrams over Non-Broadcast Multiple Access (NBMA) networks, such as ATM,
    SMDS and X.25. [STANDARDS-TRACK]</p>"
