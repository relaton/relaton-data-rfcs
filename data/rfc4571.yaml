- language: en
  script: Latn
  content: "<p>This memo defines a method for framing Real-time Transport Protocol
    (RTP) and RTP Control Protocol (RTCP) packets onto connection-oriented transport
    (such as TCP).  The memo also defines how session descriptions may specify RTP
    streams that use the framing method. [STANDARDS-TRACK]</p>"
