abstract:
- language: en
  script: Latn
  content: "<p>This document describes the conventions for using the cryptographic
    algorithms GOST 28147-89, GOST R 34.10-94, GOST R 34.10-2001, and GOST R 34.11-94
    with the Cryptographic Message Syntax (CMS).  The CMS is used for digital signature,
    digest, authentication, and encryption of arbitrary message contents. [STANDARDS-TRACK]</p>"
