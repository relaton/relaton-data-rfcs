abstract:
- language: en
  script: Latn
  content: "<p>The process by which the members of the IAB and IESG, some Trustees
    of the IETF Trust, and some Directors of the IETF Administration LLC (IETF LLC)
    are selected, confirmed, and recalled is specified in this document. This document
    is based on RFC 7437. Only those updates required to reflect the changes introduced
    by IETF Administrative Support Activity (IASA) 2.0 have been included. Any other
    changes will be addressed in future documents.</p><p>This document obsoletes RFC
    7437 and RFC 8318.</p>"
