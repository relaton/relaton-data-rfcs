abstract:
- language: en
  script: Latn
  content: "<p>The Point-to-Point Protocol (PPP) provides a standard method for transporting
    multi-protocol datagrams over point-to-point links.  PPP also defines an extensible
    Link Control Protocol (LCP), which allows negotiation of an Authentication Protocol
    for authenticating its peer before allowing Network Layer protocols to transmit
    over the link. [STANDARDS-TRACK]</p>"
