abstract:
- language: en
  script: Latn
  content: "<p>OSPFv3 includes a mechanism to support multiple instances of the protocol
    running on the same interface. OSPFv2 can utilize such a mechanism in order to
    support multiple routing domains on the same subnet.</p><p>This document defines
    the OSPFv2 Instance ID to enable separate OSPFv2 protocol instances on the same
    interface. Unlike OSPFv3 where the Instance ID can be used for multiple purposes,
    such as putting the same interface in multiple areas, the OSPFv2 Instance ID is
    reserved for identifying protocol instances.</p><p>This document updates RFC 2328.
    [STANDARDS-TRACK]</p>"
