- language: en
  script: Latn
  content: "<p>This document describes the use of Advanced Encryption Standard (AES)
    in Counter with CBC-MAC (CCM) Mode, with an explicit initialization vector (IV),
    as an IPsec Encapsulating Security Payload (ESP) mechanism to provide confidentiality,
    data origin authentication, and connectionless integrity. [STANDARDS-TRACK]</p>"
