abstract:
- language: en
  script: Latn
  content: <p>This document describes managed objects for the management of IP Traffic
    Flow Security additions to Internet Key Exchange Protocol Version 2 (IKEv2) and
    IPsec.  This document provides a read-only version of the objects defined in the
    YANG module for the same purpose, which is in "A YANG Data Model for IP Traffic
    Flow Security" (RFC 9348).</p>
