abstract:
- language: en
  script: Latn
  content: "<p>This document outlines a set of goals for proposed new IPv6 site- multihoming
    architectures.  It is recognised that this set of goals is ambitious and that
    some goals may conflict with others.  The solution or solutions adopted may only
    be able to satisfy some of the goals presented here.  This memo provides information
    for the Internet community.</p>"
