abstract:
- language: en
  script: Latn
  content: "<p>This memo is a policy statement on the implementation of the Domain
    Style Naming System in the Internet.  This memo is an update of RFC-881, and RFC-897.
    \ This is an official policy statement of the IAB and the DARPA.  The intent of
    this memo is to detail the schedule for the implementation for the Domain Style
    Naming System.  The explanation of how this system works is to be found in the
    references.</p>"
