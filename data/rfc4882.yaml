abstract:
- language: en
  script: Latn
  content: "<p>In this document, we discuss location privacy as applicable to Mobile
    IPv6.  We document the concerns arising from revealing a Home Address to an onlooker
    and from disclosing a Care-of Address to a correspondent.  This memo provides
    information for the Internet community.</p>"
