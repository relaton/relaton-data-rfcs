  content: "<p>This memo updates the registry of properties in Authentication- Results:
    message header fields to allow a multiple-result report to distinguish among one
    or more cryptographic signatures on a message, thus associating specific results
    with the signatures they represent. [STANDARDS-TRACK]</p>"
