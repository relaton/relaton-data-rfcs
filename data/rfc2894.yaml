- language: en
  script: Latn
  content: <p>This document defines a mechanism called Router Renumbering ("RR") which
    allows address prefixes on routers to be configured and reconfigured almost as
    easily as the combination of Neighbor Discovery and Address Autoconfiguration
    works for hosts. [STANDARDS-TRACK]</p>
