abstract:
- language: en
  script: Latn
  content: "<p>This document defines a set of criteria by which a DSA implementation
    may be judged.  Particular issues covered include conformance to standards; performance;
    demonstrated interoperability.  This memo provides information for the Internet
    community.  This memo does not specify an Internet standard of any kind.</p>"
