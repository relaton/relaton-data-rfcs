abstract:
- language: en
  script: Latn
  content: "<p>This document explains why, after more than six years as proposed standards,
    the DNS Server and Resolver MIB extensions were never deployed, and recommends
    retiring these MIB extensions by moving them to Historical status.  This memo
    provides information for the Internet community.</p>"
