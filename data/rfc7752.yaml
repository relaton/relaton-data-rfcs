abstract:
- language: en
  script: Latn
  content: "<p>In a number of environments, a component external to a network is called
    upon to perform computations based on the network topology and current state of
    the connections within the network, including Traffic Engineering (TE) information.
    This is information typically distributed by IGP routing protocols within the
    network.</p><p>This document describes a mechanism by which link-state and TE
    information can be collected from networks and shared with external components
    using the BGP routing protocol. This is achieved using a new BGP Network Layer
    Reachability Information (NLRI) encoding format. The mechanism is applicable to
    physical and virtual IGP links. The mechanism described is subject to policy control.</p><p>Applications
    of this technique include Application-Layer Traffic Optimization (ALTO) servers
    and Path Computation Elements (PCEs).</p>"
