abstract:
- language: en
  script: Latn
  content: "<p>This document provides information for the novice Internet user about
    using the File Transfer Protocol (FTP).  It explains what FTP is, what anonymous
    FTP is, and what an anonymous FTP archive site is.  This memo provides information
    for the Internet community.  This memo does not specify an Internet standard of
    any kind.</p>"
