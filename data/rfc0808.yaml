  content: "<p>This RFC is a very belated attempt to document a meeting that was held
    three years earlier to discuss the state of computer mail in the ARPA community
    and to reach some conclusions to guide the further development of computer mail
    systems such that a coherent total mail service would continue to be provided.</p>"
