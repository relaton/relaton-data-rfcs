- language: en
  script: Latn
  content: "<p>The Hyper Text Coffee Pot Control Protocol (HTCPCP) specification does
    not allow for the brewing of tea, in all its variety and complexity.  This paper
    outlines an extension to HTCPCP to allow for pots to provide networked tea-brewing
    facilities.</p>"
