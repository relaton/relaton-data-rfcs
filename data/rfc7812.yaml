abstract:
- language: en
  script: Latn
  content: "<p>This document defines the architecture for IP and LDP Fast Reroute
    using Maximally Redundant Trees (MRT-FRR).  MRT-FRR is a technology that gives
    link-protection and node-protection with 100% coverage in any network topology
    that is still connected after the failure.</p>"
