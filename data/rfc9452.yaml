abstract:
- language: en
  script: Latn
  content: "<p>In situ Operations, Administration, and Maintenance (IOAM) is used
    for recording and collecting operational and telemetry information while the packet
    traverses a path between two points in the network.  This document outlines how
    IOAM-Data-Fields are encapsulated with the Network Service Header (NSH).</p>"
