abstract:
- language: en
  script: Latn
  content: "<p>This document specifies the protocol used by an IPv6 router to discover
    the presence of multicast listeners (that is, nodes wishing to receive multicast
    packets) on its directly attached links, and to discover specifically which multicast
    addresses are of interest to those neighboring nodes. [STANDARDS-TRACK]</p>"
