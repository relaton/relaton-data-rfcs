abstract:
- language: en
  script: Latn
  content: "<p>This document updates RFC 3161.  It allows the use of ESSCertIDv2,
    as defined in RFC 5035, to specify the hash of a signer certificate when the hash
    is calculated with a function other than the Secure Hash Algorithm (SHA-1). [STANDARDS-TRACK]</p>"
