abstract:
- language: en
  script: Latn
  content: "<p>This document describes a Precision Time Protocol (PTP) Profile (IEEE
    Standard 1588-2019) for use in an IPv4 or IPv6 enterprise information system environment.
    \ The PTP Profile uses the End-to-End delay measurement mechanism, allowing both
    multicast and unicast Delay Request and Delay Response messages.</p>"
