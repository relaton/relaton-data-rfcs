abstract:
- language: en
  script: Latn
  content: "<p>This document specifies receiver-driven Low Extra Delay Background
    Transport (rLEDBAT) -- a set of mechanisms that enable the execution of a less-than-best-effort
    congestion control algorithm for TCP at the receiver end.  This document is a
    product of the Internet Congestion Control Research Group (ICCRG) of the Internet
    Research Task Force (IRTF).</p>"
