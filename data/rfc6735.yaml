abstract:
- language: en
  script: Latn
  content: "<p>This document defines Attribute-Value Pair (AVP) containers for various
    priority parameters for use with Diameter and the Authentication, Authorization,
    and Accounting (AAA) framework.  The parameters themselves are defined in several
    different protocols that operate at either the network or application layer. [STANDARDS-TRACK]</p>"
