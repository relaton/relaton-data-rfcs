abstract:
- language: en
  script: Latn
  content: "<p>This document describes a YANG data model for the Static Context Header
    Compression (SCHC) compression and fragmentation Rules.</p><p>This document formalizes
    the description of the Rules for better interoperability between SCHC instances
    either to exchange a set of Rules or to modify the parameters of some Rules.</p>"
