abstract:
- language: en
  script: Latn
  content: "<p>This document updates the H.248/MEGACO IANA Package registration procedures
    in order to better describe the Package registration process and to provide a
    more formal review and feedback process.  This document specifies an Internet
    Best Current Practices for the Internet Community, and requests discussion and
    suggestions for improvements.</p>"
