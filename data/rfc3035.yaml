abstract:
- language: en
  script: Latn
  content: "<p>This document extends and clarifies the relevant portions of RFC 3031
    and RFC 3036 by specifying in more detail the procedures which to be used when
    distributing labels to or from ATM-LSRs, when those labels represent Forwarding
    Equivalence Classes (FECs, see RFC 3031) for which the routes are determined on
    a hop-by-hop basis by network layer routing algorithms. [STANDARDS-TRACK]</p>"
