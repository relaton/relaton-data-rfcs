abstract:
- language: en
  script: Latn
  content: "<p>This RFC specifies the High-Level Entity Management System (HEMS) Monitoring
    and Control Language.  This language defines the requests and replies used in
    HEMS.  This memo assumes knowledge of the HEMS system described in RFC-1021, and
    of the ISO data encoding standard, ASN.1.</p>"
