abstract:
- language: en
  script: Latn
  content: "<p>In the wake of IPv4 exhaustion and deployment of IP address sharing
    techniques, this document recommends that Internet-facing servers log port number
    and accurate timestamps in addition to the incoming IP address.  This memo documents
    an Internet Best Current Practice.</p>"
