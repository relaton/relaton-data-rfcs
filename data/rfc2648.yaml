  content: <p>This document proposes the "ietf" namespace, which consists of the RFC
    family of documents (RFCs, STDs, FYIs, and BCPs) developed by the IETF and published
    by the RFC Editor and the minutes of working groups (WG) and birds of a feather
    (BOF) meetings that occur during IETF conferences. [STANDARDS-TRACK]</p>
