abstract:
- language: en
  script: Latn
  content: "<p>This document describes a pseudowire encapsulation for Time Division
    Multiplexing (TDM) bit-streams (T1, E1, T3, E3) that disregards any structure
    that may be imposed on these streams, in particular the structure imposed by the
    standard TDM framing. [STANDARDS-TRACK]</p>"
