- language: en
  script: Latn
  content: "<p>Extending the Domain Name System (DNS) with new Resource Record (RR)
    types currently requires changes to name server software.  This document specifies
    the changes necessary to allow future DNS implementations to handle new RR types
    transparently. [STANDARDS-TRACK]</p>"
