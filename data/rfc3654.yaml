abstract:
- language: en
  script: Latn
  content: "<p>This document introduces the Forwarding and Control Element Separation
    (ForCES) architecture and defines a set of associated terminology.  This document
    also defines a set of architectural, modeling, and protocol requirements to logically
    separate the control and data forwarding planes of an IP (IPv4, IPv6, etc.) networking
    device.</p>"
