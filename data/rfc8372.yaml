abstract:
- language: en
  script: Latn
  content: "<p>This document discusses aspects to consider when developing a solution
    for MPLS flow identification.  The key application that needs this solution is
    in-band performance monitoring of MPLS flows when MPLS is used to encapsulate
    user data packets.</p>"
