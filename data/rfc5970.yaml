- language: en
  script: Latn
  content: "<p>The Dynamic Host Configuration Protocol for IPv6 (DHCPv6) provides
    a framework for passing configuration information to nodes on a network.  This
    document describes new options for DHCPv6 that SHOULD be used for booting a node
    from the network. [STANDARDS-TRACK]</p>"
