abstract:
- language: en
  script: Latn
  content: "<p>This specification defines a Session Initiation Protocol (SIP) event
    package for session-specific policies.  This event package enables user agents
    (UAs) to subscribe to session policies for a SIP session and to receive notifications
    if these policies change. [STANDARDS-TRACK]</p>"
