abstract:
- language: en
  script: Latn
  content: "<p>This document provides a list of typical Media Control Channel Framework
    call flows.  It aims at being a simple guide to the use of the interface between
    Application Servers and MEDIACTRL-based Media Servers, as well as a base reference
    document for both implementors and protocol researchers.</p>"
