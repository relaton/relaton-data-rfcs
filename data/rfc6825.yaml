abstract:
- language: en
  script: Latn
  content: "<p>This memo defines the Management Information Base (MIB) objects for
    managing the Traffic Engineering Database (TED) information with extensions in
    support of the Multiprotocol Label Switching (MPLS) with Traffic Engineering (TE)
    as well as Generalized MPLS (GMPLS) for use with network management protocols.
