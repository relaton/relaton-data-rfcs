abstract:
- language: en
  script: Latn
  content: "<p>This RFC is a commentary on the difficulty of deciding upon an acceptably
    distinctive hostname for one's computer, a problem which grows in direct proportion
    to the logarithmically increasing size of the Internet.  This memo provides information
    for the Internet community.  This memo does not specify an Internet standard of
    any kind.</p>"
