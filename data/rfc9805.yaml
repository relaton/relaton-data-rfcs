abstract:
- language: en
  script: Latn
  content: "<p>This document deprecates the IPv6 Router Alert option. Protocols that
    use the IPv6 Router Alert option may continue to do so, even in future versions.
    However, new protocols that are standardized in the future must not use the IPv6
    Router Alert option.</p><p>This document updates RFC 2711.</p>"
