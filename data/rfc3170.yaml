abstract:
- language: en
  script: Latn
  content: "<p>This document describes the challenges involved with designing and
    implementing multicast applications.  It is an introductory guide for application
    developers that highlights the unique considerations of multicast applications
    as compared to unicast applications.  This memo provides information for the Internet
    community.</p>"
