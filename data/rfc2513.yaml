- language: en
  script: Latn
  content: "<p>This memo defines a portion of the Management Information Base (MIB)
    for use with network management protocols in the Internet community.  In particular,
    it describes managed objects used for controlling the collection and storage of
    accounting information for connection-oriented networks such as ATM. [STANDARDS-TRACK]</p>"
