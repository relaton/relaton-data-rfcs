abstract:
- language: en
  script: Latn
  content: "<p>This memo specifies SEcure Neighbor Discovery (SEND) Source Address
    Validation Improvement (SAVI), a mechanism to provide source address validation
    using the SEND protocol.  The proposed mechanism complements ingress filtering
    techniques to provide a finer granularity on the control of IPv6 source addresses.</p>"
