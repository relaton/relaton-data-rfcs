abstract:
- language: en
  script: Latn
  content: "<p>This document defines a new BGP opaque extended community to carry
    the origination Autonomous System (AS) validation state inside an autonomous system.
    \ Internal BGP (IBGP) speakers that receive this validation state can configure
    local policies that allow it to influence their decision process.</p>"
