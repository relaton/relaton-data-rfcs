abstract:
- language: en
  script: Latn
  content: "<p>New technologies are adding new information into IS-IS while deployment
    scales are simultaneously increasing.  This causes the contents of many critical
    TLVs to exceed the currently supported limit of 255 octets.  This document codifies
    the common mechanism of extending the TLV content space through multiple TLVs.</p>"
