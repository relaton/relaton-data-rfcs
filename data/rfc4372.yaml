abstract:
- language: en
  script: Latn
  content: "<p>This document describes a new Remote Authentication Dial-In User Service
    (RADIUS) attribute, Chargeable-User-Identity.  This attribute can be used by a
    home network to identify a user for the purpose of roaming transactions that occur
    outside of the home network. [STANDARDS-TRACK]</p>"
