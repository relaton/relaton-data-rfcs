abstract:
- language: en
  script: Latn
  content: "<p>This document describes an extension to the mapping of Point-to-Point
    Protocol (PPP) into Synchronous Optical NETwork/Synchronous Digital Hierarchy
    (SONET/SDH) to include the use of SONET/SDH SPE/VC virtual concatenation and the
    use of both high order and low order payloads. [STANDARDS-TRACK]</p>"
