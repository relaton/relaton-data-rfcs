abstract:
- language: en
  script: Latn
  content: "<p>This RFC, which contains the text of an Internet Draft that was submitted
    originally to the SIP Working Group, is being published now for the historical
    record and to provide a reference for later Informational RFCs. The original Abstract
    follows.</p><p>This document proposes an extension to the Session Initiation Protocol
    (SIP). This extension provides the ability for the called SIP user agent to identify
    from whom the call was diverted and why the call was diverted. The extension defines
    a general header, Diversion, which conveys the diversion information from other
    SIP user agents and proxies to the called user agent.</p><p>This extension allows
    enhanced support for various features, including Unified Messaging, Third-Party
    Voicemail, and Automatic Call Distribution (ACD). SIP user agents and SIP proxies
    that receive diversion information may use this as supplemental information for
    feature invocation decisions. This document defines a Historic Document for the
    Internet community.</p>"
