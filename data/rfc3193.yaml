abstract:
- language: en
  script: Latn
  content: "<p>This document discusses how L2TP (Layer Two Tunneling Protocol) may
    utilize IPsec to provide for tunnel authentication, privacy protection, integrity
    checking and replay protection.  Both the voluntary and compulsory tunneling cases
    are discussed. [STANDARDS-TRACK]</p>"
