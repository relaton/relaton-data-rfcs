abstract:
- language: en
  script: Latn
  content: "<p>This document discusses the properties, applicability, and operational
    considerations of Routing in Fat Trees (RIFT) in different network scenarios with
    the intention of providing a rough guide on how RIFT can be deployed to simplify
    routing operations in Clos topologies and their variations.</p>"
