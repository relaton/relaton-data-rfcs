abstract:
- language: en
  script: Latn
  content: "<p>This document discusses the usage and applicability of BGP Link State
    (BGP-LS) Shortest Path First (SPF) extensions in data center networks utilizing
    Clos or Fat Tree topologies.  The document is intended to provide simplified guidance
    for the deployment of BGP-LS SPF extensions.</p>"
