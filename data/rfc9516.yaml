abstract:
- language: en
  script: Latn
  content: "<p>A set of requirements for active Operations, Administration, and Maintenance
    (OAM) for Service Function Chaining (SFC) in a network is presented in this document.
    \ Based on these requirements, an encapsulation of active OAM messages in SFC
    and a mechanism to detect and localize defects are described.</p>"
