abstract:
- language: en
  script: Latn
  content: "<p>The IPv6 flow label has certain restrictions on its use.  This document
    describes how those restrictions apply when using the flow label for load balancing
    by equal cost multipath routing and for link aggregation, particularly for IP-in-IPv6
    tunneled traffic. [STANDARDS-TRACK]</p>"
