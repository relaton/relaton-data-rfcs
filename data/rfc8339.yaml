abstract:
- language: en
  script: Latn
  content: "<p>Label Switched Path (LSP) Ping is a widely deployed Operation, Administration,
    and Maintenance (OAM) mechanism in MPLS networks.  This document describes a mechanism
    to verify connectivity of Point-to-Multipoint (P2MP) Pseudowires (PWs) using LSP
    Ping.</p>"
