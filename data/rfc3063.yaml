abstract:
- language: en
  script: Latn
  content: <p>This paper presents a simple mechanism, based on "threads", which can
    be used to prevent Multiprotocol Label Switching (MPLS) from setting up label
    switched path (LSPs) which have loops.  This memo defines an Experimental Protocol
    for the Internet community.</p>
