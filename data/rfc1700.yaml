- language: en
  script: Latn
  content: "<p>This RFC is a snapshot of the ongoing process of the assignment of
    protocol parameters for the Internet protocol suite.  To make the current information
    readily available the assignments are kept up-to- date in a set of online text
    files.  This memo is a status report on the parameters (i.e., numbers and keywords)
