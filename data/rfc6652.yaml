abstract:
- language: en
  script: Latn
  content: "<p>This memo presents extensions to the Abuse Reporting Format (ARF) and
    Sender Policy Framework (SPF) specifications to allow for detailed reporting of
    message authentication failures in an on-demand fashion.</p><p>This memo updates
    RFC 4408 by providing an IANA registry for SPF modifiers. [STANDARDS-TRACK]</p>"
