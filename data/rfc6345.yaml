abstract:
- language: en
  script: Latn
  content: "<p>This document specifies Protocol for carrying Authentication for Network
    Access (PANA) Relay Element functionality, which enables PANA messaging between
    a PANA Client (PaC) and a PANA Authentication Agent (PAA) where the two nodes
    cannot reach each other by means of regular IP routing. [STANDARDS-TRACK]</p>"
