abstract:
- language: en
  script: Latn
  content: "<p>This document requests IANA registration of an Enumservice for XMPP,
    the Extensible Messaging and Presence Protocol.  This Enumservice specifically
    allows the use of 'xmpp' Uniform Resource Identifiers (URIs) in the context of
    E.164 Number Mapping (ENUM). [STANDARDS-TRACK]</p>"
