abstract:
- language: en
  script: Latn
  content: "<p>The Source Packet Routing in Networking (SPRING) architecture describes
    how Segment Routing can be used to steer packets through an IPv6 or MPLS network
    using the source routing paradigm.  This document illustrates some use cases for
    Segment Routing in an IPv6-only environment.</p>"
