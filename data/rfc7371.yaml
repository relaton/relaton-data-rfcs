abstract:
- language: en
  script: Latn
  content: "<p>This document updates the IPv6 multicast addressing architecture by
    redefining the reserved bits as generic flag bits. The document also provides
    some clarifications related to the use of these flag bits.</p><p>This document
    updates RFCs 3956, 3306, and 4291.</p>"
