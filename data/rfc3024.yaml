abstract:
- language: en
  script: Latn
  content: "<p>This document proposes backwards-compatible extensions to Mobile IP
    to support topologically correct reverse tunnels.  This document does not attempt
    to solve the problems posed by firewalls located between the home agent and the
    mobile node's care-of address. [STANDARDS-TRACK]</p>"
