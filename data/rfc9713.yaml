- language: en
  script: Latn
  content: <p>This document updates RFC 9171 to clarify that Bundle Protocol Version
    7 agents are expected to use the IANA "Bundle Administrative Record Types" registry
    to identify and document administrative record types.  This document also designates
    code points for Private and Experimental Use.</p>
