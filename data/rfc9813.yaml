abstract:
- language: en
  script: Latn
  content: "<p>This document provides implementation and operational considerations
    for using TLS Pre-Shared Keys (TLS-PSKs) with RADIUS/TLS (RFC 6614) and RADIUS/DTLS
    (RFC 7360).  The purpose of the document is to help smooth the operational transition
    from the use of RADIUS/UDP to RADIUS/TLS.</p>"
