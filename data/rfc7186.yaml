abstract:
- language: en
  script: Latn
  content: "<p>This document analyzes common security threats of the Neighborhood
    Discovery Protocol (NHDP) and describes their potential impacts on Mobile Ad Hoc
    Network (MANET) routing protocols using NHDP.  This document is not intended to
    propose solutions to the threats described.</p>"
