abstract:
- language: en
  script: Latn
  content: "<p>This memo describes version 1 of RSVP, a resource reservation setup
    protocol designed for an integrated services Internet.  RSVP provides receiver-initiated
    setup of resource reservations for multicast or unicast data flows, with good
    scaling and robustness properties. [STANDARDS-TRACK]</p>"
