abstract:
- language: en
  script: Latn
  content: "<p>A node may have support for communications using IPv4 and/or IPv6 protocols.
    \ Such a node may wish to obtain IPv4 and/or IPv6 configuration settings via the
    Dynamic Host Configuration Protocol (DHCP).  The original version of DHCP (RFC
    2131) designed for IPv4 has now been complemented by a new DHCPv6 (RFC 3315) for
    IPv6.  This document describes issues identified with dual IP version DHCP interactions,
    the most important aspect of which is how to handle potential problems in clients
    processing configuration information received from both DHCPv4 and DHCPv6 servers.
    \ The document makes a recommendation on the general strategy on how best to handle
    such issues and identifies future work to be undertaken.  This memo provides information
    for the Internet community.</p>"
