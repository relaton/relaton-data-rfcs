abstract:
- language: en
  script: Latn
  content: "<p>This document specifies new FTP commands to obtain listings of remote
    directories in a defined format, and to permit restarts of interrupted data transfers
    in STREAM mode.  It allows character sets other than US-ASCII, and also defines
    an optional virtual file storage structure. [STANDARDS-TRACK]</p>"
