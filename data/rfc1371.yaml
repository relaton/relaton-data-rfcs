  content: <p>This memo presents motivation, rationale and other surrounding background
    information leading to the IESG's recommendation to the IAB for a single "common
    IGP" for the IP portions of the Internet.  This memo provides information for
    the Internet community.  It does not specify an Internet standard.</p>
