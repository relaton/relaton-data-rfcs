abstract:
- language: en
  script: Latn
  content: "<p>This document specifies the notification mechanism for XCON (centralized
    conferencing).  This mechanism reuses the SIP (Session Initiation Protocol) event
    package for conference state.  Additionally, the notification mechanism includes
    support for the XCON data model and for partial notifications. [STANDARDS-TRACK]</p>"
