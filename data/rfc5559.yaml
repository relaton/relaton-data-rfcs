- language: en
  script: Latn
  content: "<p>This document describes a general architecture for flow admission and
    termination based on pre-congestion information in order to protect the quality
    of service of established, inelastic flows within a single Diffserv domain.  This
    memo provides information for the Internet community.</p>"
