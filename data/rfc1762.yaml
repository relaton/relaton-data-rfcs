abstract:
- language: en
  script: Latn
  content: "<p>This document defines the NCP for establishing and configuring Digital's
    DNA Phase IV Routing protocol (DECnet Phase IV) over PPP.  This document applies
    only to DNA Phase IV Routing messages (both data and control), and not to other
    DNA Phase IV protocols (MOP, LAT, etc). [STANDARDS-TRACK]</p>"
