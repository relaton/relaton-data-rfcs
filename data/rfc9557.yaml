abstract:
- language: en
  script: Latn
  content: <p>This document defines an extension to the timestamp format defined in
    RFC 3339 for representing additional information, including a time zone.</p><p>It
    updates RFC 3339 in the specific interpretation of the local offset Z, which is
    no longer understood to "imply that UTC is the preferred reference point for the
    specified time".</p>
