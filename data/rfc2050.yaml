abstract:
- language: en
  script: Latn
  content: "<p>This document describes the registry system for the distribution of
    globally unique Internet address space and registry operations.  Particularly
    this document describes the rules and guidelines governing the distribution of
    this address space.  This document specifies an Internet Best Current Practices
    for the Internet Community, and requests discussion and suggestions for improvements.</p>"
