abstract:
- language: en
  script: Latn
  content: "<p>Two common ways to communicate timezone information are POSIX 1003.1
    timezone strings and timezone database names.  This memo specifies DHCP options
    for each of those methods.  The DHCPv4 time offset option is deprecated. [STANDARDS-TRACK]</p>"
