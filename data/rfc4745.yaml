abstract:
- language: en
  script: Latn
  content: "<p>This document defines a framework for authorization policies controlling
    access to application-specific data.  This framework combines common location-
    and presence-specific authorization aspects.  An XML schema specifies the language
    in which common policy rules are represented.  The common policy framework can
    be extended to other application domains. [STANDARDS-TRACK]</p>"
