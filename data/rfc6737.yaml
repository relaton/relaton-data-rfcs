abstract:
- language: en
  script: Latn
  content: "<p>This document defines a new Diameter application and associated Command
    Codes.  The Capabilities Update application is intended to allow the dynamic update
    of certain Diameter peer capabilities while the peer-to-peer connection is in
    the open state. [STANDARDS-TRACK]</p>"
