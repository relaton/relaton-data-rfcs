abstract:
- language: en
  script: Latn
  content: "<p>The Lightweight Directory Access Protocol (LDAP) supports a mechanism
    for requesting the return of all user attributes but not all operational attributes.
    \ This document describes an LDAP extension which clients may use to request the
    return of all operational attributes.</p>"
