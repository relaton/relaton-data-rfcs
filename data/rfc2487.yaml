abstract:
- language: en
  script: Latn
  content: "<p>This document describes an extension to the SMTP service that allows
    an SMTP server and client to use transport-layer security to provide private,
    authenticated communication over the Internet.  This gives SMTP agents the ability
    to protect some or all of their communications from eavesdroppers and attackers.
