abstract:
- language: en
  script: Latn
  content: "<p>This document defines an HTTP authentication scheme for Privacy Pass,
    a privacy-preserving authentication mechanism used for authorization.  The authentication
    scheme specified in this document can be used by Clients to redeem Privacy Pass
    tokens with an Origin.  It can also be used by Origins to challenge Clients to
    present Privacy Pass tokens.</p>"
