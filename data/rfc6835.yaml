- language: en
  script: Latn
  content: "<p>A simple tool called the Locator/ID Separation Protocol (LISP) Internet
    Groper or 'lig' can be used to query the LISP mapping database.  This document
    describes how it works.  This document is not an Internet Standards Track specification;
    it is published for informational purposes.</p>"
