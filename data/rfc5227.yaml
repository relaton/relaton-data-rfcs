abstract:
- language: en
  script: Latn
  content: "<p>When two hosts on the same link attempt to use the same IPv4 address
    at the same time (except in rare special cases where this has been arranged by
    prior coordination), problems ensue for one or both hosts.  This document describes
    (i) a simple precaution that a host can take in advance to help prevent this misconfiguration
    from happening, and (ii) if this misconfiguration does occur, a simple mechanism
    by which a host can passively detect, after the fact, that it has happened, so
    that the host or administrator may respond to rectify the problem. [STANDARDS-TRACK]</p>"
