abstract:
- language: en
  script: Latn
  content: "<p>This document describes the security architecture required to implement
    identity-based encryption, a public-key encryption technology that uses a user's
    identity as a public key.  It also defines data structures that can be used to
    implement the technology.  This memo provides information for the Internet community.</p>"
