abstract:
- language: en
  script: Latn
  content: "<p>This document presents a list of requirements in support of Emergency
    Telecommunications Service (ETS) within a single administrative domain.  This
    document focuses on a specific set of administrative constraints and scope.  Solutions
    to these requirements are not presented in this document.  This memo provides
    information for the Internet community.</p>"
