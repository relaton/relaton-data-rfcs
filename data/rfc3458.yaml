abstract:
- language: en
  script: Latn
  content: <p>This memo describes a new RFC 2822 message header, "Message-Context".  This
    header provides information about the context and presentation characteristics
    of a message.  A receiving user agent (UA) may use this information as a hint
    to optimally present the message. [STANDARDS-TRACK]</p>
