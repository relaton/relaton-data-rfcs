abstract:
- language: en
  script: Latn
  content: "<p>This specification outlines current recommendations for the use of
    Transport Layer Security (TLS) to provide confidentiality of email traffic between
    a Mail User Agent (MUA) and a Mail Submission Server or Mail Access Server.  This
    document updates RFCs 1939, 2595, 3501, 5068, 6186, and 6409.</p>"
