- language: en
  script: Latn
  content: "<p>This document specifies a new Dynamic Host Configuration Protocol for
    IPv6 (DHCPv6) option that can be used to exchange information about a DHCPv6 client's
    Fully Qualified Domain Name (FQDN) and about responsibility for updating DNS resource
    records (RRs) related to the client's address assignments. [STANDARDS-TRACK]</p>"
